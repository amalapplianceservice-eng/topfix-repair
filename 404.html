    .btn{display:inline-flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;font-weight:600;font-size:1rem;padding:14px 26px;border-radius:999px;border:2px solid transparent;text-decoration:none;transition:.2s;}
    .btn-primary{background:var(--forest);color:#fff;box-shadow:0 8px 20px rgba(26,92,58,.28);}
    .btn-primary:hover{background:#134129;transform:translateY(-2px);}
    .btn-outline{border-color:var(--forest);color:var(--forest);}
    .btn-outline:hover{background:var(--forest);color:#fff;}
    .links{margin-top:36px;font-size:.95rem;color:var(--muted);}
    .links a{color:var(--sea);font-weight:600;text-decoration:none;margin:0 8px;white-space:nowrap;}
    .links a:hover{color:var(--forest);text-decoration:underline;}
